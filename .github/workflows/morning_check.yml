name: EmailBison Morning Check

on:
  workflow_dispatch:       # manual trigger only — scheduled alerts disabled

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Lead refill report
        run: python emailbison_morning_check.py
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

      - name: Domain health check
        run: python domain_health_check.py
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_HEALTH: ${{ secrets.SLACK_WEBHOOK_HEALTH }}

      - name: Daily reply rate report
        run: python daily_snapshot.py
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_REPORTS }}
